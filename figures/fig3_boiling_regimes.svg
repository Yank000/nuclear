<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720"><rect width="100%" height="100%" fill="white"/><text x="600" y="55" text-anchor="middle" font-size="30" font-family="Arial,Microsoft YaHei,sans-serif" font-weight="bold">液滴撞击高温壁面的沸腾状态演化（原创示意）</text><text x="270" y="105" text-anchor="middle" font-size="24" font-family="Arial,Microsoft YaHei,sans-serif">核态沸腾</text><text x="570" y="105" text-anchor="middle" font-size="24" font-family="Arial,Microsoft YaHei,sans-serif">过渡沸腾</text><text x="870" y="105" text-anchor="middle" font-size="24" font-family="Arial,Microsoft YaHei,sans-serif">膜态沸腾</text><g fill="#46aaf5" stroke="#1450a0" stroke-width="4"><ellipse cx="270" cy="350" rx="80" ry="75"/><ellipse cx="570" cy="350" rx="80" ry="75"/><ellipse cx="870" cy="350" rx="80" ry="75"/></g><g fill="#aaa"><rect x="150" y="520" width="240" height="35"/><rect x="450" y="520" width="240" height="35"/><rect x="750" y="520" width="240" height="35"/></g><g stroke="#f0a028" stroke-width="4" fill="none"><circle cx="235" cy="465" r="15"/><circle cx="275" cy="455" r="18"/><circle cx="315" cy="468" r="14"/></g><rect x="490" y="480" width="160" height="25" fill="#ffd25a"/><g fill="#46aaf5" stroke="#1450a0" stroke-width="2"><circle cx="470" cy="395" r="14"/><circle cx="670" cy="395" r="14"/><circle cx="545" cy="270" r="12"/><circle cx="610" cy="275" r="12"/></g><rect x="795" y="485" width="150" height="20" fill="#ffd25a"/><line x1="870" y1="285" x2="870" y2="200" stroke="#46aaf5" stroke-width="14"/><circle cx="870" cy="180" r="17" fill="#46aaf5" stroke="#1450a0"/><text x="270" y="140" text-anchor="middle" font-size="20" font-family="Arial,Microsoft YaHei,sans-serif">固-液直接接触，气泡成核</text><text x="570" y="140" text-anchor="middle" font-size="20" font-family="Arial,Microsoft YaHei,sans-serif">局部接触/蒸汽隔离并存，破碎强</text><text x="870" y="140" text-anchor="middle" font-size="20" font-family="Arial,Microsoft YaHei,sans-serif">稳定蒸汽膜，弹跳/射流</text><line x1="220" y1="625" x2="920" y2="625" stroke="#c83c28" stroke-width="7"/><polygon points="920,605 920,645 965,625" fill="#c83c28"/><text x="570" y="660" text-anchor="middle" font-size="24" font-family="Arial,Microsoft YaHei,sans-serif" fill="#b43228">壁面温度升高</text></svg>